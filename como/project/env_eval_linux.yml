# Minimale Conda-Env für UITB-Evaluation auf dem Cluster (thumb-rl-eval).
# Ohne OpenCV/Qt/ffmpeg aus conda-forge, um Paketkonflikte zu vermeiden.
# NumPy 2.x ist Pflicht (stable_baselines3/gymnasium nutzen numpy._core).
#
# Erstellen auf dem Cluster:
#   conda env create -f env_eval_linux.yml -n thumb-rl-eval
# Oder bestehendes Env aktualisieren (nur NumPy 2):
#   conda activate thumb-rl-eval && pip install "numpy>=2"
#
name: thumb-rl-eval
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy>=2
  - glfw
  - mujoco
  - pip:
      - gymnasium
      - stable-baselines3
      - torch
      - matplotlib
      - scipy
      - pandas
      - xmltodict
      - myosuite>=2.11.0
